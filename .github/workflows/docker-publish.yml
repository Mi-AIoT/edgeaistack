name: Build and Push EdgeAI Stack

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all repos'
        required: false
        default: 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Clone AmbiqAI repos
        run: |
          mkdir -p src
          while IFS= read -r line; do
            line=$(echo "$line" | sed 's/#.*//;s/^[[:space:]]*//;s/[[:space:]]*$//')
            [ -z "$line" ] && continue
            repo=$(echo "$line" | awk '{print $1}')
            branch=$(echo "$line" | awk '{print $2}')
            name=$(basename "$repo")
            echo "=== Cloning $repo ==="
            if [ -n "$branch" ]; then
              git clone --branch "$branch" "https://github.com/$repo.git" "src/$name" || echo "WARN: failed to clone $repo"
            else
              git clone "https://github.com/$repo.git" "src/$name" || echo "WARN: failed to clone $repo"
            fi
          done < repos.txt

      - name: Remove .git dirs to save space
        run: find src -maxdepth 2 -type d -name .git -exec rm -rf {} + 2>/dev/null || true

      - name: Download AITG PyPI source packages
        run: |
          mkdir -p aitg-packages
          pip3 download --no-binary :all: --no-deps -d aitg-packages \
            helia-edge physiokit heartkit neuralspotx sleepkit helia-aot neuralspot-edge

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule,pattern={{date 'YYYY.MM.DD'}}
            type=raw,value=latest
            type=sha,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
